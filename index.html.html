<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TrataSoft Login</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{font-family:Segoe UI;background:#f2f4f8}
.box{width:350px;margin:80px auto;background:white;padding:30px;border-radius:8px;text-align:center}
input{width:100%;padding:10px;margin:8px 0}
button{padding:10px;width:100%;background:#1d3557;color:white;border:none}
.switch{color:blue;cursor:pointer}
</style>
</head>

<body>

<div class="box" id="loginBox">
<h2>Login</h2>

<input id="loginUsername" placeholder="Username">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p class="switch" onclick="toggle()">Register</p>
<p id="loginError"></p>

</div>


<div class="box" id="registerBox" style="display:none">

<h2>Register</h2>

<input id="regUsername" placeholder="Username">
<input id="regPassword" type="password" placeholder="Password">
<input id="regEmail" placeholder="Email">

<button onclick="register()">Register</button>

<p class="switch" onclick="toggle()">Back to Login</p>

<p id="regMsg"></p>

</div>


<script>

const firebaseConfig = {
apiKey: "AIzaSyDKtHixAqtV7mt3rLG6O40cD5sag_PPT-4",
databaseURL: "https://aitdata-1f856-default-rtdb.firebaseio.com",
projectId: "aitdata"
};


firebase.initializeApp(firebaseConfig);

const db = firebase.database();

function toggle(){

let login = document.getElementById("loginBox");
let reg = document.getElementById("registerBox");

login.style.display = login.style.display=="none"?"block":"none";
reg.style.display = reg.style.display=="none"?"block":"none";

}



function register(){

let username=document.getElementById("regUsername").value;
let password=document.getElementById("regPassword").value;
let email=document.getElementById("regEmail").value;

if(!username||!password||!email){
document.getElementById("regMsg").innerText="Fill all fields";
return;
}

db.ref("users").orderByChild("username").equalTo(username).get()
.then(snap=>{

if(snap.exists()){
document.getElementById("regMsg").innerText="Username already exists";
return;
}

let newUser=db.ref("users").push();

newUser.set({
username:username,
password:password,
email:email,
status:"pending"
});

document.getElementById("regMsg").innerText="Registration sent for admin approval";

});

}



function login(){

let username=document.getElementById("loginUsername").value;
let password=document.getElementById("loginPassword").value;

db.ref("users").orderByChild("username").equalTo(username).get()
.then(snap=>{

if(!snap.exists()){
document.getElementById("loginError").innerText="User not found";
return;
}

let user=Object.values(snap.val())[0];

if(user.password!==password){
document.getElementById("loginError").innerText="Wrong password";
return;
}

if(user.status!=="approved"){
document.getElementById("loginError").innerText="Waiting for admin approval";
return;
}

sessionStorage.setItem("user",username);

window.location="index.html";

});

}

</script>

</body>
</html>
