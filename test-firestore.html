<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TrataSoft Login & Registration with Mobile Verification</title>
<style>
body { margin:0; font-family:'Segoe UI', sans-serif; background:#f4f6f9; }
.box { width:350px; padding:40px; background:white; border-radius:10px; box-shadow:0 10px 30px rgba(0,0,0,0.2); margin: 50px auto; text-align:center; }
.box h2 { margin-bottom:20px; }
.box input { width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc; }
.box button { width:100%; padding:10px; background:#1d3557; color:white; border:none; border-radius:5px; cursor:pointer; margin-top:10px; }
.switch { color:#1d3557; cursor:pointer; margin-top:15px; display:block; }
.error { color:red; font-size:14px; margin-top:10px; }
.success { color:green; font-size:14px; margin-top:10px; }
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

</head>
<body>

<!-- Login Box -->
<div class="box" id="loginBox">
    <h2>Login</h2>
    <input type="text" id="loginUsername" placeholder="Username">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="login()">Login</button>
    <span class="switch" onclick="toggleForm()">Don't have an account? Register</span>
    <p class="error" id="loginError"></p>
</div>

<!-- Registration Box -->
<div class="box" id="registerBox" style="display:none;">
    <h2>Register</h2>
    <input type="text" id="regUsername" placeholder="Username">
    <input type="password" id="regPassword" placeholder="Password">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="text" id="regPhone" placeholder="Mobile Number (+91XXXXXXXXXX)">
    <div id="recaptcha-container"></div>
    <button onclick="sendOTP()">Send OTP</button>
    <input type="text" id="otpCode" placeholder="Enter OTP" style="display:none;">
    <button onclick="verifyOTP()" id="verifyBtn" style="display:none;">Verify OTP</button>
    <span class="switch" onclick="toggleForm()">Already have an account? Login</span>
    <p class="error" id="regError"></p>
    <p class="success" id="regSuccess"></p>
</div>

<script>
// ---------------- Firebase Config ----------------
const firebaseConfig = {
  apiKey: "AIzaSyC1I7uggV3I8Z7pmbpWQmJZO_mHlWQ7qRc",
  authDomain: "aitdata-1f856.firebaseapp.com",
  databaseURL: "https://aitdata-1f856-default-rtdb.firebaseio.com",
  projectId: "aitdata-1f856",
  storageBucket: "aitdata-1f856.firebasestorage.app",
  messagingSenderId: "535350785851",
  appId: "1:535350785851:web:67abe23a6da1dca7fe291e",
  measurementId: "G-82Y1DL677C"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// ---------------- Toggle Forms ----------------
function toggleForm(){
    const loginBox = document.getElementById("loginBox");
    const regBox = document.getElementById("registerBox");
    loginBox.style.display = loginBox.style.display === "none" ? "block" : "none";
    regBox.style.display = regBox.style.display === "none" ? "block" : "none";
}

// ---------------- Login ----------------
function login(){
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value.trim();
    document.getElementById("loginError").innerText = "";

    if(!username || !password){
        document.getElementById("loginError").innerText="Fill all fields!";
        return;
    }

    db.ref("users").orderByChild("username").equalTo(username).get().then(snapshot=>{
        if(snapshot.exists()){
            const userData = Object.values(snapshot.val())[0];
            if(userData.password === password){
                sessionStorage.setItem("loggedInUser", username);
                window.location.href = "dashboard.html";
            } else {
                document.getElementById("loginError").innerText="Incorrect password!";
            }
        } else {
            document.getElementById("loginError").innerText="User not found!";
        }
    });
}

// ---------------- Registration with Phone OTP ----------------
let confirmationResult = null;

// Initialize reCAPTCHA once globally
window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
    'size': 'invisible',
    'callback': () => { console.log("reCAPTCHA verified"); },
    'expired-callback': () => { console.log("reCAPTCHA expired"); }
});
recaptchaVerifier.render();

function sendOTP(){
    const phone = document.getElementById("regPhone").value.trim();
    const username = document.getElementById("regUsername").value.trim();
    const password = document.getElementById("regPassword").value.trim();
    const email = document.getElementById("regEmail").value.trim();
    document.getElementById("regError").innerText="";
    document.getElementById("regSuccess").innerText="";

    if(!username || !password || !email || !phone){
        document.getElementById("regError").innerText="Fill all fields!";
        return;
    }

    // Check if username exists
    db.ref("users").orderByChild("username").equalTo(username).get().then(snapshot=>{
        if(snapshot.exists()){
            document.getElementById("regError").innerText="Username already exists!";
            return;
        } else {
            // Use the global reCAPTCHA
            auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
            .then((result) => {
                confirmationResult = result;
                document.getElementById("otpCode").style.display="block";
                document.getElementById("verifyBtn").style.display="block";
                document.getElementById("regSuccess").innerText="OTP sent to your mobile!";
            }).catch((error)=>{
                document.getElementById("regError").innerText=error.message;
            });
        }
    });
}

function verifyOTP(){
    const otp = document.getElementById("otpCode").value.trim();
    if(!otp){ document.getElementById("regError").innerText="Enter OTP!"; return; }

    confirmationResult.confirm(otp).then((result) => {
        const user = result.user;

        // Save user in Firebase Realtime Database
        const username = document.getElementById("regUsername").value.trim();
        const password = document.getElementById("regPassword").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const phone = document.getElementById("regPhone").value.trim();

        const newUserRef = db.ref("users").push();
        newUserRef.set({ username, password, email, phone }).then(()=>{
            document.getElementById("regSuccess").innerText="Registration successful!";
            document.getElementById("regUsername").value="";
            document.getElementById("regPassword").value="";
            document.getElementById("regEmail").value="";
            document.getElementById("regPhone").value="";
            document.getElementById("otpCode").style.display="none";
            document.getElementById("verifyBtn").style.display="none";
        });
    }).catch((error)=>{
        document.getElementById("regError").innerText="Invalid OTP!";
    });
}
</script>
</body>
</html>
